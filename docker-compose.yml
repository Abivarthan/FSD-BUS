version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: fleet_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: fleet_management
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - fleet_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mongodb
      DB_PORT: 27017
      DB_NAME: fleet_management
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_min_32_chars}
      JWT_EXPIRES_IN: 24h
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      FRONTEND_URL: http://localhost
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - fleet_network
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleet_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - fleet_network

  nginx:
    image: nginx:alpine
    container_name: fleet_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fleet_network

networks:
  fleet_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  backend_logs:
    driver: local

